name: Build macOS DMG

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python and Dependencies
      run: |
        # 1. 시스템 파이썬 대신 Tkinter가 포함된 최신 파이썬을 강제 설치
        brew install python@3.10
        # 2. 파이썬 환경 설정
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        # 3. Tkinter 라이브러리가 파이썬 환경에 있는지 확인
        python3 -c "import tkinter; print('Tkinter is ready!')"

    - name: Setup FFmpeg
      run: brew install ffmpeg

    - name: Build Executable
      run: |
        source venv/bin/activate
        # 모든 파일을 루트로 복사
        cp src/*.py .
        cp src/*.pyw .
        
        # PyInstaller 실행
        pyinstaller --noconfirm --onedir --windowed --name "HDR_to_SDR_Converter" \
          --add-data "gui.py:." --add-data "conversion.py:." --add-data "utils.py:." \
          --add-binary "$(which ffmpeg):." \
          --add-binary "$(which ffprobe):." \
          main.pyw

    - name: Create DMG
      run: |
        mkdir -p dmg_tmp
        # .app 파일을 찾아서 복사
        find dist -name "*.app" -exec cp -r {} dmg_tmp/ \;
        # 바로가기 생성
        ln -s /Applications dmg_tmp/Applications
        # DMG 압축
        hdiutil create -volname "HDR_to_SDR" -srcfolder dmg_tmp -ov -format UDZO dist/HDR_to_SDR_Converter.dmg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HDR-to-SDR-macOS
        path: dist/HDR_to_SDR_Converter.dmg
