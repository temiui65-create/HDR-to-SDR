name: Build macOS DMG

on:
  push:
    branches: [ "main" ] # 본인의 주 브랜치 이름에 맞게 수정 (master 등)
  workflow_dispatch: # 수동 빌드 버튼 활성화

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Homebrew FFmpeg & Copy to src
      run: |
        brew install ffmpeg
        mkdir -p src
        cp $(which ffmpeg) src/ffmpeg
        cp $(which ffprobe) src/ffprobe
        cp $(which ffplay) src/ffplay

    - name: Build Executable with PyInstaller
      run: |
            SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
            echo "Site packages path: $SITE_PACKAGES"
            
            # [수정] --add-binary 목적지를 루트(.)가 아닌 bin 폴더로 지정하여 모듈 폴더 덮어쓰기를 방지합니다.
            # [수정] --collect-submodules ffmpeg 를 추가해 ffmpeg 파이썬 모듈 누락을 방지합니다.
            pyinstaller --windowed --name "HDR_to_SDR_Converter" --icon=logo/icon.ico \
              --hidden-import=numpy \
              --hidden-import=numpy.core \
              --add-data "$SITE_PACKAGES/sv_ttk:sv_ttk" \
              --add-data "$SITE_PACKAGES/tkinterdnd2:tkinterdnd2" \
              --add-data "$SITE_PACKAGES/PIL:PIL" \
              --add-binary "src/ffmpeg:bin" \
              --add-binary "src/ffprobe:bin" \
              --add-binary "src/ffplay:bin" \
              --collect-submodules ffmpeg \
              --collect-submodules numpy \
              --log-level DEBUG \
              src/main.pyw
          
    - name: Create DMG (Using appdmg)
      run: |
        # 서명 에러가 없는 오픈소스 표준 DMG 빌드 도구 설치
        npm install -g appdmg
        
        # appdmg 구성을 위한 설정 JSON 정의 파일 동적 생성
        cat << 'EOF' > appdmg.json
        {
          "title": "HDR to SDR Converter",
          "icon": "logo/icon.ico",
          "background": "",
          "contents": [
            { "x": 448, "y": 344, "type": "link", "path": "/Applications" },
            { "x": 192, "y": 344, "type": "file", "path": "dist/HDR_to_SDR_Converter.app" }
          ]
        }
        EOF
        
        # DMG 패키징 빌드 실행
        appdmg appdmg.json dist/HDR_to_SDR_Converter_macOS.dmg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HDR-to-SDR-macOS-DMG
        path: dist/HDR_to_SDR_Converter_macOS.dmg
