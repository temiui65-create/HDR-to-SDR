name: Build macOS DMG

on:
  push:
    branches: [ "main" ] # 본인의 주 브랜치 이름에 맞게 수정하세요 (예: master, main 등)
  workflow_dispatch: # 수동으로 빌드를 실행할 수 있는 버튼을 활성화합니다

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Homebrew FFmpeg & Copy to src
      run: |
        brew install ffmpeg
        # PyInstaller 빌드를 위해 src 폴더에 macOS용 ffmpeg 바이너리 복사
        mkdir -p src
        cp $(which ffmpeg) src/ffmpeg
        cp $(which ffprobe) src/ffprobe
        cp $(which ffplay) src/ffplay

    - name: Build Executable with PyInstaller
      run: |
        # Python이 설치된 site-packages 실제 위치를 환경 변수로 자동 획득합니다.
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        echo "Site packages path: $SITE_PACKAGES"
        
        # macOS 환경에 맞춰 세미콜론(;)을 콜론(:)으로 변경하고, 줄바꿈 기호를 \ 로 수정하여 빌드합니다.
        pyinstaller --windowed --name "HDR_to_SDR_Converter" --icon=logo/icon.ico \
          --hidden-import=numpy \
          --hidden-import=numpy.core \
          --add-data "$SITE_PACKAGES/sv_ttk:sv_ttk" \
          --add-data "$SITE_PACKAGES/tkinterdnd2:tkinterdnd2" \
          --add-data "$SITE_PACKAGES/PIL:PIL" \
          --add-binary "src/ffmpeg:." \
          --add-binary "src/ffprobe:." \
          --add-binary "src/ffplay:." \
          --collect-submodules numpy \
          --log-level DEBUG \
          src/main.pyw

    - name: Create DMG
      run: |
        # node 기반의 create-dmg 도구를 사용하여 깔끔한 DMG를 생성합니다.
        npm install -g create-dmg
        cd dist
        create-dmg "HDR_to_SDR_Converter.app" || true
        # 생성된 DMG 파일명을 고정값으로 정형화합니다.
        mv *.dmg HDR_to_SDR_Converter_macOS.dmg

    # [수정 완료] 오타가 난 부분을 공식 액션 명칭으로 올바르게 수정했습니다.
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HDR-to-SDR-macOS-DMG
        path: dist/HDR_to_SDR_Converter_macOS.dmg
