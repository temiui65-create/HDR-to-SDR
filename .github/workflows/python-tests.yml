name: Build macOS DMG

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Setup FFmpeg
      uses: FedericoCarboni/setup-ffmpeg@v3

    - name: Build Executable
      run: |
        # 1. 모든 소스를 최상위 루트로 복사 (경로 꼬임 방지)
        cp src/*.py .
        cp src/*.pyw .
        
        # 2. 파이썬 기반 빌드 (NPM 아예 안 씀)
        pyinstaller --noconfirm --onedir --windowed --name "HDR_to_SDR_Converter" \
          --add-data "gui.py:." --add-data "conversion.py:." --add-data "utils.py:." \
          --add-binary "$(which ffmpeg):." \
          --add-binary "$(which ffprobe):." \
          main.pyw

    - name: Create DMG (Native macOS Tool)
      run: |
        # 3. 아키텍처 타지 않는 macOS 기본 도구 hdiutil 사용
        mkdir -p dmg_tmp
        cp -r dist/HDR_to_SDR_Converter/HDR_to_SDR_Converter.app dmg_tmp/
        ln -s /Applications dmg_tmp/Applications
        
        hdiutil create -volname "HDR_to_SDR" -srcfolder dmg_tmp -ov -format UDZO dist/HDR_to_SDR_Converter.dmg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HDR-to-SDR-macOS
        path: dist/HDR_to_SDR_Converter.dmg
