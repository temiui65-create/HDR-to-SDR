name: Build macOS DMG

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download Full FFmpeg (Martin Riedl ARM64 with zscale)
      run: |
        # 죽어버린 BtbN 링크 대신, 완벽하게 작동하는 
        # Martin Riedl의 M1(arm64) 풀버전(zscale 포함) 직통 링크로 변경합니다.
        curl -L -o ffmpeg.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/snapshot/ffmpeg.zip"
        curl -L -o ffprobe.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/snapshot/ffprobe.zip"
        curl -L -o ffplay.zip "https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/snapshot/ffplay.zip"
        
        # 압축 해제 (경고문 무시를 위해 -q 옵션 추가)
        unzip -q ffmpeg.zip -d ffmpeg_ext
        unzip -q ffprobe.zip -d ffprobe_ext
        unzip -q ffplay.zip -d ffplay_ext
        
        mkdir -p src/bin
        # zip 내부의 폴더 구조와 상관없이 바이너리만 쏙 빼서 bin 폴더로 강제 이동시킵니다.
        find ffmpeg_ext -type f -name "ffmpeg" -exec mv {} src/bin/ \;
        find ffprobe_ext -type f -name "ffprobe" -exec mv {} src/bin/ \;
        find ffplay_ext -type f -name "ffplay" -exec mv {} src/bin/ \;
        
        # 맥OS 실행 권한 필수 부여
        chmod +x src/bin/ffmpeg src/bin/ffprobe src/bin/ffplay

    - name: Build Executable with PyInstaller
      run: |
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        
        # 앱 실행 코드의 검증 로직 통과를 위해 ffplay까지 완벽히 패키징합니다.
        pyinstaller --noconfirm --windowed --name "HDR_to_SDR_Converter" --icon=logo/icon.ico \
          --hidden-import=numpy \
          --hidden-import=numpy.core \
          --add-data "$SITE_PACKAGES/sv_ttk:sv_ttk" \
          --add-data "$SITE_PACKAGES/tkinterdnd2:tkinterdnd2" \
          --add-data "$SITE_PACKAGES/PIL:PIL" \
          --add-binary "src/bin/ffmpeg:bin" \
          --add-binary "src/bin/ffprobe:bin" \
          --add-binary "src/bin/ffplay:bin" \
          --collect-submodules ffmpeg \
          --collect-submodules numpy \
          --log-level DEBUG \
          src/main.pyw

    - name: Create DMG (Using appdmg)
      run: |
        npm install -g appdmg --no-fund --no-audit
        
        cat << 'EOF' > appdmg.json
        {
          "title": "HDR to SDR Converter",
          "icon": "logo/icon.ico",
          "contents": [
            { "x": 448, "y": 344, "type": "link", "path": "/Applications" },
            { "x": 192, "y": 344, "type": "file", "path": "dist/HDR_to_SDR_Converter.app" }
          ]
        }
        EOF
        
        appdmg appdmg.json dist/HDR_to_SDR_Converter_macOS.dmg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HDR-to-SDR-macOS-DMG
        path: dist/HDR_to_SDR_Converter_macOS.dmg
