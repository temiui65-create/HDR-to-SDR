name: Build macOS DMG

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest # 대기열 없는 최신 M1 서버 사용!
    timeout-minutes: 15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download Full FFmpeg (BtbN ARM64 with zscale)
      run: |
        # zscale이 포함된 M1(arm64) 전용 최고사양 FFmpeg를 직통으로 다운로드합니다.
        curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-macos-arm64-gpl.zip
        unzip ffmpeg.zip
        
        # 압축 푼 폴더에서 바이너리를 빼내어 src/bin 폴더에 세팅합니다.
        mkdir -p src/bin
        cp ffmpeg-master-latest-macos-arm64-gpl/bin/ffmpeg src/bin/
        cp ffmpeg-master-latest-macos-arm64-gpl/bin/ffprobe src/bin/
        cp ffmpeg-master-latest-macos-arm64-gpl/bin/ffplay src/bin/ || true

    - name: Build Executable with PyInstaller
      run: |
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        
        pyinstaller --noconfirm --windowed --name "HDR_to_SDR_Converter" --icon=logo/icon.ico \
          --hidden-import=numpy \
          --hidden-import=numpy.core \
          --add-data "$SITE_PACKAGES/sv_ttk:sv_ttk" \
          --add-data "$SITE_PACKAGES/tkinterdnd2:tkinterdnd2" \
          --add-data "$SITE_PACKAGES/PIL:PIL" \
          --add-binary "src/bin/ffmpeg:bin" \
          --add-binary "src/bin/ffprobe:bin" \
          --add-binary "src/bin/ffplay:bin" \
          --collect-submodules ffmpeg \
          --collect-submodules numpy \
          --log-level DEBUG \
          src/main.pyw

    - name: Create DMG (Using appdmg)
      run: |
        npm install -g appdmg --no-fund --no-audit
        
        cat << 'EOF' > appdmg.json
        {
          "title": "HDR to SDR Converter",
          "icon": "logo/icon.ico",
          "contents": [
            { "x": 448, "y": 344, "type": "link", "path": "/Applications" },
            { "x": 192, "y": 344, "type": "file", "path": "dist/HDR_to_SDR_Converter.app" }
          ]
        }
        EOF
        
        appdmg appdmg.json dist/HDR_to_SDR_Converter_macOS.dmg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HDR-to-SDR-macOS-DMG
        path: dist/HDR_to_SDR_Converter_macOS.dmg
