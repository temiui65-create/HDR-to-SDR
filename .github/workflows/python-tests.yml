name: Build macOS DMG

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Setup FFmpeg
      uses: FedericoCarboni/setup-ffmpeg@v3

    - name: Build
      run: |
        # 1. 빌드 전 정리
        rm -rf dist build
        
        # 2. 실행파일 빌드
        # 파일 경로 꼬임 방지를 위해 모든 소스를 현재 디렉토리로 복사
        cp src/*.py .
        cp src/*.pyw .
        
        pyinstaller --noconfirm --onedir --windowed --name "HDR_to_SDR_Converter" \
          --add-data "gui.py:." --add-data "conversion.py:." --add-data "utils.py:." \
          --add-binary "$(which ffmpeg):." \
          --add-binary "$(which ffprobe):." \
          main.pyw

    - name: Create DMG
      run: |
        # 3. macOS 순정 도구 hdiutil을 사용 (어떠한 아키텍처 의존성도 없음)
        mkdir -p dmg_tmp
        cp -r dist/HDR_to_SDR_Converter/HDR_to_SDR_Converter.app dmg_tmp/
        ln -s /Applications dmg_tmp/Applications
        
        hdiutil create -volname "HDR_to_SDR" -srcfolder dmg_tmp -ov -format UDZO dist/HDR_to_SDR_Converter.dmg

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: HDR-to-SDR-macOS
        path: dist/HDR_to_SDR_Converter.dmg
