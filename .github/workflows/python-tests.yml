name: Build macOS DMG

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Setup Full FFmpeg (Static Build with zscale)
      uses: FedericoCarboni/setup-ffmpeg@v3
      id: setup-ffmpeg

    - name: Copy FFmpeg to bin
      run: |
        mkdir -p src/bin
        cp $(which ffmpeg) src/bin/ffmpeg
        cp $(which ffprobe) src/bin/ffprobe
        
        # [핵심 방어] ffplay가 정적 빌드에 없어서 PyInstaller가 터지는 것을 막기 위해
        # 파일이 없을 경우 빈 가짜(dummy) 파일을 생성해 줍니다.
        cp $(which ffplay) src/bin/ffplay || touch src/bin/ffplay

    - name: Build Executable with PyInstaller
      run: |
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        echo "Site packages path: $SITE_PACKAGES"
        
        # [핵심 수정] --add-binary 경로를 src/bin/ffmpeg 로 완벽히 맞췄습니다!
        pyinstaller --windowed --name "HDR_to_SDR_Converter" --icon=logo/icon.ico \
          --paths=src \
          --hidden-import=gui \
          --hidden-import=conversion \
          --hidden-import=utils \
          --hidden-import=numpy \
          --hidden-import=numpy.core \
          --add-data "$SITE_PACKAGES/sv_ttk:sv_ttk" \
          --add-data "$SITE_PACKAGES/tkinterdnd2:tkinterdnd2" \
          --add-data "$SITE_PACKAGES/PIL:PIL" \
          --add-binary "src/bin/ffmpeg:bin" \
          --add-binary "src/bin/ffprobe:bin" \
          --add-binary "src/bin/ffplay:bin" \
          --collect-submodules ffmpeg \
          --collect-submodules numpy \
          --log-level DEBUG \
          src/main.pyw

    - name: Create DMG (Using appdmg)
      run: |
        npm install -g appdmg
        
        cat << 'EOF' > appdmg.json
        {
          "title": "HDR to SDR Converter",
          "icon": "logo/icon.ico",
          "background": "",
          "contents": [
            { "x": 448, "y": 344, "type": "link", "path": "/Applications" },
            { "x": 192, "y": 344, "type": "file", "path": "dist/HDR_to_SDR_Converter.app" }
          ]
        }
        EOF
        
        appdmg appdmg.json dist/HDR_to_SDR_Converter_macOS.dmg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HDR-to-SDR-macOS-DMG
        path: dist/HDR_to_SDR_Converter_macOS.dmg
