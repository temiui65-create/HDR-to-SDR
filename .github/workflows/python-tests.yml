name: Build macOS DMG

on:
  push:
    branches: [ "main" ] # 본인의 주 브랜치 이름에 맞게 수정하세요
  workflow_dispatch: # 수동으로 빌드를 실행할 수 있는 버튼을 활성화합니다

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller dmglib # dmg 생성을 위해 dmglib 또는 도구 설치

    - name: Install Homebrew FFmpeg & Copy to src
      run: |
        brew install ffmpeg
        # PyInstaller 빌드를 위해 src 폴더에 macOS용 ffmpeg 바이너리 복사
        mkdir -p src
        cp $(which ffmpeg) src/ffmpeg
        cp $(which ffprobe) src/ffprobe
        # ffplay가 필요한 경우 함께 복사 (없으면 생략 가능)
        if which ffplay > /dev/null; then cp $(which ffplay) src/ffplay; fi

    - name: Build Executable with PyInstaller
      run: |
        # macOS 환경에 맞춰 세미콜론(;)을 콜론(:)으로, 줄바꿈(^)을 (\)로 변경합니다.
        # 실행 파일(.exe) 확장자를 제거하고 macOS 앱 번들(.app) 형태로 빌드하게 구성합니다.
        pyinstaller --windowed --name "HDR_to_SDR_Converter" --icon=logo/icon.ico \
          --hidden-import=numpy \
          --hidden-import=numpy.core \
          --add-binary "src/ffmpeg:." \
          --add-binary "src/ffprobe:." \
          --collect-submodules numpy \
          --log-level DEBUG \
          src/main.pyw
          
        # 주의: 기존 sv_ttk나 tkinterdnd2 등 패키지 경로 정보는 
        # GitHub Actions 환경의 site-packages 위치를 자동으로 잡도록 `--add-data`를 수정하거나
        # 필요한 경우에만 추가해야 합니다. 보통 가상환경이 아니므로 생략해도 자동으로 수집되는 경우가 많습니다.

    - name: Create DMG
      run: |
        # node 기반의 create-dmg 도구를 사용하여 깔끔한 DMG를 생성합니다.
        npm install -g create-dmg
        cd dist
        create-dmg "HDR_to_SDR_Converter.app" || true
        # 생성된 파일명을 확인하고 정형화합니다.
        mv *.dmg HDR_to_SDR_Converter_macOS.dmg

    - name: Upload Artifact
      uses: actions/artifacts-upload@v4
      with:
        name: HDR-to-SDR-macOS-DMG
        path: dist/HDR_to_SDR_Converter_macOS.dmg
