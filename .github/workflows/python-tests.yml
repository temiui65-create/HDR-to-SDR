name: Build macOS DMG

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Node.js를 사용하는 공식 액션들을 배제하기 위해 직접 파이썬 설치
    - name: Set up Python
      run: |
        brew install python@3.10
        python3 -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Setup FFmpeg
      run: brew install ffmpeg

    - name: Build Executable
      run: |
        source venv/bin/activate
        cp src/*.py .
        cp src/*.pyw .
        pyinstaller --noconfirm --onedir --windowed --name "HDR_to_SDR_Converter" \
          --add-data "gui.py:." --add-data "conversion.py:." --add-data "utils.py:." \
          --add-binary "$(which ffmpeg):." \
          --add-binary "$(which ffprobe):." \
          main.pyw

    - name: Create DMG
      run: |
        mkdir -p dmg_tmp
        cp -r dist/HDR_to_SDR_Converter/HDR_to_SDR_Converter.app dmg_tmp/
        hdiutil create -volname "HDR_to_SDR" -srcfolder dmg_tmp -ov -format UDZO dist/HDR_to_SDR_Converter.dmg

    # 업로드 액션도 아키텍처 체크를 할 수 있으니, 직접 curl로 전송하거나 
    # 일단 여기서 빌드까지만 성공하는지 보겠습니다.
    - name: Final Result
      run: ls -lh dist/HDR_to_SDR_Converter.dmg
