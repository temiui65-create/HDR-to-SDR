name: Build macOS DMG

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Setup Full FFmpeg
      uses: FedericoCarboni/setup-ffmpeg@v3

    - name: Prepare Binaries
      run: |
        mkdir -p src/bin
        cp $(which ffmpeg) src/bin/ffmpeg
        cp $(which ffprobe) src/bin/ffprobe
        touch src/bin/ffplay

    - name: Build Executable
      run: |
        # 프로젝트 루트를 파이썬 경로에 추가하여 절대 경로로 인식시킴
        export PYTHONPATH=$PYTHONPATH:$(pwd)/src
        
        pyinstaller --noconfirm --onedir --windowed --name "HDR_to_SDR_Converter" --icon=logo/icon.ico \
          --paths=src \
          --collect-all gui \
          --collect-all conversion \
          --collect-all utils \
          --hidden-import=gui \
          --hidden-import=conversion \
          --hidden-import=utils \
          --add-data "src/gui.py:." \
          --add-data "src/conversion.py:." \
          --add-data "src/utils.py:." \
          --add-binary "src/bin/ffmpeg:bin" \
          --add-binary "src/bin/ffprobe:bin" \
          --add-binary "src/bin/ffplay:bin" \
          src/main.pyw

    - name: Create DMG
      run: |
        mkdir -p dmg_build
        cp -r dist/HDR_to_SDR_Converter/HDR_to_SDR_Converter.app dmg_build/
        ln -s /Applications dmg_build/Applications
        hdiutil create -volname "HDR_to_SDR" -srcfolder dmg_build -ov -format UDZO dist/HDR_to_SDR_Converter_macOS.dmg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HDR-to-SDR-macOS-DMG
        path: dist/HDR_to_SDR_Converter_macOS.dmg
