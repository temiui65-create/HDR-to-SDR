name: Build macOS DMG

on:
  push:
    branches: [ "main" ] # 본인의 주 브랜치 이름에 맞게 수정 (master 등)
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Homebrew FFmpeg & Copy to src
      run: |
        brew install ffmpeg
        mkdir -p src
        cp $(which ffmpeg) src/ffmpeg
        cp $(which ffprobe) src/ffprobe
        cp $(which ffplay) src/ffplay

    - name: Build Executable with PyInstaller
      run: |
        SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
        echo "Site packages path: $SITE_PACKAGES"
        
        # macOS 환경에서는 폴더 통째로(--add-data) 복사할 때 경로가 꼬이지 않도록 
        # 목적지 경로를 라이브러리 이름 명확히 지정해 주는 것이 안전합니다.
        pyinstaller --windowed --name "HDR_to_SDR_Converter" --icon=logo/icon.ico \
          --hidden-import=numpy \
          --hidden-import=numpy.core \
          --add-data "$SITE_PACKAGES/sv_ttk:sv_ttk" \
          --add-data "$SITE_PACKAGES/tkinterdnd2:tkinterdnd2" \
          --add-data "$SITE_PACKAGES/PIL:PIL" \
          --add-binary "src/ffmpeg:." \
          --add-binary "src/ffprobe:." \
          --add-binary "src/ffplay:." \
          --collect-submodules numpy \
          --log-level DEBUG \
          src/main.pyw

    - name: Create DMG
      run: |
        npm install -g create-dmg
        cd dist
        
        # [핵심 수정] --identity="" 옵션을 추가하여 애플 인증서 서명 단계를 건너뜁니다.
        create-dmg "HDR_to_SDR_Converter.app" --identity="" || true
        
        # 파일 이름 정형화
        mv *.dmg HDR_to_SDR_Converter_macOS.dmg

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HDR-to-SDR-macOS-DMG
        path: dist/HDR_to_SDR_Converter_macOS.dmg
